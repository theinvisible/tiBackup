name: deb

# Build the tiBackup Debian package for every supported distribution and publish
# release tags to the iteas aptly repository (https://apt-api.iteas.at/api).
#
#   * Pushes to master and version tags build the package once per target distro
#     (Debian 13, Ubuntu 24.04, Ubuntu 26.04) inside the matching iteas build
#     image, so dh_shlibdeps pins distro-correct dependency versions and the
#     Qt6/libc ABI matches the target. tiBackupLib is built+installed as a .deb
#     from the matching source ref first, so find_package + dh_shlibdeps resolve
#     against a real package. Every build uploads the .deb as a workflow artifact.
#   * Only version tags (v*) are published, via the upload_build_release recipe
#     baked into the iteas build image (upload -> repo iteas-<codename> -> snapshot
#     -> publish under filesystem:iteas:iteas, Release signed server-side), and
#     attached to the GitHub Release. Master builds stay as artifacts only.
#   * The legacy Cloudsmith publish is kept but disabled; re-enable it by setting
#     the repository variable PUBLISH_CLOUDSMITH=true.
#
# Requires repository secrets:
#   * APTLY_AUTH           - HTTP basic auth "user:password" for apt-api.iteas.at
#   * ITEAS_REGISTRY_USER  - GitLab deploy token username (scope: read_registry)
#   * ITEAS_REGISTRY_TOKEN - GitLab deploy token value
#   * CLOUDSMITH_API_KEY   - only needed if the Cloudsmith path is re-enabled

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  # Same-named ref/tag of tiBackupLib (lockstep releases).
  TIBACKUPLIB_REF: ${{ github.ref_name }}
  CLOUDSMITH_REPO: ti-9x5p/tibackup

jobs:
  debian-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialize: all legs publish under the same aptly prefix filesystem:iteas:iteas
      # (each a different distribution), so avoid concurrent DELETE/POST publish cycles.
      max-parallel: 1
      matrix:
        image:
          - git.styrion.net:4567/iteas/docker-build-images/iteas-build-debian-13-64
          - git.styrion.net:4567/iteas/docker-build-images/iteas-build-ubuntu-2404-64
          - git.styrion.net:4567/iteas/docker-build-images/iteas-build-ubuntu-2604-64
    container:
      image: ${{ matrix.image }}
      credentials:
        username: ${{ secrets.ITEAS_REGISTRY_USER }}
        password: ${{ secrets.ITEAS_REGISTRY_TOKEN }}
    steps:
      - name: Bootstrap container & install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git lsb-release \
            build-essential fakeroot devscripts debhelper cmake \
            qt6-base-dev qt6-base-dev-tools \
            qt6-httpserver-dev qt6-websockets-dev \
            libpoco-dev libudev-dev libblkid-dev uuid-dev \
            rsync cryptsetup

      - name: Detect distribution
        run: |
          . /etc/os-release
          echo "DISTRO_ID=${ID}" >> "$GITHUB_ENV"
          echo "CODENAME=${VERSION_CODENAME}" >> "$GITHUB_ENV"

      - name: Checkout tiBackup
        uses: actions/checkout@v4

      - name: Checkout tiBackupLib (${{ env.TIBACKUPLIB_REF }})
        uses: actions/checkout@v4
        with:
          repository: theinvisible/tiBackupLib
          ref: ${{ env.TIBACKUPLIB_REF }}
          path: _deps/tiBackupLib

      - name: Build & install tiBackupLib Debian packages
        run: |
          ( cd _deps/tiBackupLib/tibackuplib-dev && echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc )
          ( cd _deps/tiBackupLib && echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc )
          apt-get install -y ./_deps/tiBackupLib/tibackuplib-dev_*.deb ./_deps/tibackuplib_*.deb
          # keep the consumer source tree clean for its own debuild
          rm -rf _deps

      - name: Build tiBackup Debian package
        run: |
          mkdir -p artifacts
          echo "y" | debuild -eDEB_BUILD_OPTIONS="parallel=$(nproc)" -us -uc
          mv ../tibackup_*.deb artifacts/
          # disambiguate filenames per distro (same version lives in several dists)
          ( cd artifacts && for f in *.deb; do arch="${f##*_}"; rest="${f%_*}"; mv "$f" "${rest}_${CODENAME}_${arch}"; done )
          ls -l artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tibackup-deb-${{ env.CODENAME }}
          path: artifacts/*.deb

      - name: Publish to iteas apt repository
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APTLY_AUTH: ${{ secrets.APTLY_AUTH }}
        run: |
          set -euo pipefail
          # upload_build_release is baked into the iteas build image (/usr/local/bin):
          # uploads each .deb to repo iteas-<codename>, then re-snapshots and
          # re-publishes under filesystem:iteas:iteas (Release signed server-side).
          upload_build_release artifacts/*.deb

      - name: Publish to Cloudsmith (disabled — set repo variable PUBLISH_CLOUDSMITH=true to re-enable)
        if: startsWith(github.ref, 'refs/tags/') && vars.PUBLISH_CLOUDSMITH == 'true'
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          apt-get install -y --no-install-recommends python3-pip
          pip3 install --break-system-packages --upgrade cloudsmith-cli
          for deb in artifacts/*.deb; do
            cloudsmith push deb "${CLOUDSMITH_REPO}/${DISTRO_ID}/${CODENAME}" "$deb"
          done

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
