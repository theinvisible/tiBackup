# tiBackup log retention.
#
# The per-run (backup_detail) and per-job rsync logs are written once and then
# closed, and the web UI lists them by their original file names - so they are
# age-cleaned IN PLACE here (no rename) rather than rotated. The age check uses
# mtime only (m:) because these files are never modified after the run finishes.
# The held-open tibackup.log is handled by logrotate.d/tibackup, not here; it is
# explicitly excluded below (x) so this cleanup pass never touches - or warns
# about - it. A single recursive rule on the log root then age-cleans the per-run
# and per-job logs at any depth. (A glob like "e /var/log/tibackup/*" also matches
# the tibackup.log FILE, and the "e" type expects a directory, so it prints
# "'/var/log/tibackup/tibackup.log' already exists and is not a directory." during
# systemd-tmpfiles --create - harmless but noisy on every upgrade.)
#
# Paths track the default paths/logs (/var/log/tibackup). If you change paths/logs
# in main.conf, adjust these lines to match.
#
#Type Path                            Mode UID  GID  Age
x     /var/log/tibackup/tibackup.log
e     /var/log/tibackup               -    -    -    m:90d
